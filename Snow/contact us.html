<h1>Contact Us</h1>

<div class="contact-info">
  <p><strong>Email:</strong> support@snowconeco.com</p>
  <p><strong>Phone:</strong> (954) 674-6767</p>
</div>

<div class="form-container">
  <h2 style="text-align:center; color: teal;">Send Us a Message</h2>

  <form>
    <label>Your Name</label>
    <input type="text" placeholder="Enter your name" required>

    <label>Your Email</label>
    <input type="email" placeholder="Enter your email" required>

    <label>Your Phone Number</label>
    <input type="tel" placeholder="Enter your phone number">

    <label>Reason for Contact</label>
    <select required>
      <option value="">Select a category</option>
      <option>Complaint</option>
      <option>Request for Service</option>
      <option>Positive Review</option>
    </select>

    <label>Your Message</label>
    <textarea rows="5" placeholder="Type your message here..." required></textarea>

    <button type="submit">Submit</button>
  </form>
</div>

<div class="form-container">
  <h2 style="text-align:center; color: teal;">Quick Contact Form</h2>

  <form>
    <label>Preferred Contact Method</label>
    <select required>
      <option>Email</option>
      <option>Phone</option>
      <option>Either</option>
    </select>

    <label>Your Email</label>
    <input type="email" placeholder="Enter your email" required>

    <label>Short Message</label>
    <textarea rows="3" placeholder="Write a short message..." required></textarea>

    <button type="submit">Send</button>
  </form>
  
</div>
